# treeflow — agent conversation tree CLI configuration
# Lives next to treeflow's package code. Edit and restart treeflow to apply changes.
# Environment variables (CLAUDE_PROJECTS_DIR, CODEX_SESSIONS_DIR, TREEFLOW_DEBUG_KEYS,
# NO_COLOR) still override these.


# Rows shown per page in any paginated view (project picker, node list, tree).
page_size = 15

# Which agent CLI to drive by default. One of: "claude" | "codex".
# Override per-invocation with `treeflow --claude` / `treeflow --codex`
# / `treeflow --tool codex`.
tool = "claude"


[paths]

# Where Claude Code stores its conversation jsonl files.
claude_projects_dir = "~/.claude/projects"

# Where OpenAI Codex CLI stores its session rollouts (organized by YYYY/MM/DD).
codex_sessions_dir = "~/.codex/sessions"


[browser]

# Initial view when entering the browser. One of: "tree" | "list" | "leaves".
default_view = "tree"

# Default tree sort order. One of: "oldest_first" | "newest_first".
# Inside the browser, press Ctrl+R to flip between the two at runtime.
tree_order = "oldest_first"


[debug]

# Log every keypress (raw bytes) to stderr — useful when arrow keys misbehave.
# The env var TREEFLOW_DEBUG_KEYS=1 also turns this on.
log_keys = false
