<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Codex Tree QA</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">◇</span>
          <div class="brand-copy">
            <strong>Codex Tree QA</strong>
            <span id="workspaceLabel"></span>
          </div>
        </div>
        <label class="project-select">
          <span>项目</span>
          <select id="projectSelect"></select>
        </label>
        <label class="search-box">
          <span>⌕</span>
          <input id="searchInput" type="search" placeholder="搜索节点" autocomplete="off" />
        </label>
        <div class="topbar-actions">
          <div class="direction-toggle" aria-label="树方向">
            <button class="active" data-direction="down" type="button">向下</button>
            <button data-direction="right" type="button">向右</button>
          </div>
          <button id="focusBtn" class="icon-button" type="button" title="聚焦">⌖</button>
          <button id="refreshBtn" class="icon-button" type="button" title="刷新">↻</button>
        </div>
      </header>

      <main class="main-layout">
        <section class="canvas-column">
          <aside id="workspaceDrawer" class="workspace-drawer collapsed">
            <button id="workspaceToggleBtn" class="workspace-toggle" type="button" title="展开 Workspace" aria-label="展开 Workspace">W</button>
            <div class="workspace-drawer-body">
              <div class="panel-heading">
                <h2>Workspace</h2>
                <div class="panel-actions">
                  <button id="workspaceCollapseBtn" class="icon-button" type="button" title="折叠 Workspace">‹</button>
                  <button id="workspaceRefreshBtn" class="icon-button" type="button" title="刷新 Workspace">↻</button>
                </div>
              </div>
              <div id="workspaceFileList" class="workspace-file-list"></div>
            </div>
          </aside>

          <div id="canvasHost" class="canvas-host">
            <svg id="treeSvg" role="img" aria-label="Codex 问答树">
              <defs>
                <filter id="nodeShadow" x="-20%" y="-20%" width="140%" height="140%">
                  <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#1f2937" flood-opacity="0.14" />
                </filter>
              </defs>
              <g id="viewport">
                <g id="edgeLayer"></g>
                <g id="nodeLayer"></g>
              </g>
            </svg>
            <div id="emptyState" class="empty-state">
              <div class="ghost-root">say something</div>
            </div>
            <div class="zoom-controls">
              <button id="zoomInBtn" class="icon-button" type="button" title="放大">+</button>
              <button id="zoomOutBtn" class="icon-button" type="button" title="缩小">−</button>
            </div>
            <canvas id="miniMap" width="180" height="116"></canvas>
          </div>
        </section>

        <div id="sideResizeHandle" class="side-resize-handle" role="separator" aria-orientation="vertical" title="拖拽调整对话栏宽度"></div>

        <aside id="sidePanel" class="side-panel">
          <section class="chat-header">
            <div class="panel-heading">
              <h2 id="detailTitle">对话</h2>
              <div class="panel-actions">
                <button id="deleteBtn" class="icon-button danger-button" type="button" title="删除节点及后续节点">⌫</button>
                <button id="exportBtn" class="icon-button" type="button" title="导出">⇩</button>
              </div>
            </div>
            <div id="detailMeta" class="detail-meta"></div>
            <div class="side-tabs" aria-label="侧栏">
              <button class="active" data-side-tab="conversation" type="button">对话</button>
              <button data-side-tab="notes" type="button">笔记</button>
            </div>
          </section>

          <section id="conversationPane" class="side-tab-panel conversation-pane">
            <div id="conversationList" class="conversation-list"></div>

            <form id="composer" class="composer sidebar-composer">
              <div class="composer-meta">
                <div id="selectedFiles" class="selected-files"></div>
              </div>
              <div class="composer-row">
                <label class="composer-upload" title="上传附件" aria-label="上传附件">
                  <input id="fileInput" type="file" multiple />
                  <span aria-hidden="true">+</span>
                </label>
                <textarea id="promptInput" rows="3" placeholder="输入问题"></textarea>
                <button id="sendBtn" type="submit">发送</button>
              </div>
            </form>
          </section>

          <section id="notePane" class="side-tab-panel note-pane" hidden>
            <div class="note-toolbar">
              <span id="noteStatus" class="note-status">节点笔记</span>
              <div class="panel-actions">
                <button id="noteProjectBtn" class="icon-button" type="button" title="读取当前项目所有节点的笔记">☷</button>
                <button id="noteEditBtn" class="icon-button" type="button" title="编辑笔记">笔</button>
                <button id="noteSaveBtn" class="icon-button" type="button" title="保存笔记" hidden>✓</button>
              </div>
            </div>
            <div id="noteBox" class="note-box">
              <textarea id="noteEditor" rows="8" placeholder="笔记" hidden></textarea>
              <div id="noteRendered" class="note-rendered"></div>
            </div>
          </section>
        </aside>
      </main>

      <div id="workspacePreview" class="workspace-preview" hidden>
        <button id="workspacePreviewBackdrop" class="workspace-preview-backdrop" type="button" aria-label="关闭预览"></button>
        <section class="workspace-preview-panel" aria-label="Workspace 文件预览">
          <header class="workspace-preview-header">
            <div class="workspace-preview-title">
              <h2 id="workspacePreviewTitle">Workspace</h2>
              <span id="workspacePreviewMeta"></span>
            </div>
            <div class="panel-actions">
              <a id="workspaceOpenBtn" class="icon-button" href="#" target="_blank" rel="noopener noreferrer" title="新窗口打开">↗</a>
              <a id="workspaceDownloadBtn" class="icon-button" href="#" title="下载">⇩</a>
              <button id="workspacePreviewCloseBtn" class="icon-button" type="button" title="关闭">×</button>
            </div>
          </header>
          <div id="workspacePreviewBody" class="workspace-preview-body"></div>
        </section>
      </div>

      <div id="noteContextMenu" class="note-context-menu" hidden>
        <button id="noteContextAppendBtn" type="button">记录到笔记</button>
      </div>
      <div id="nodeNotePreview" class="node-note-preview" hidden></div>
      <div id="nodePromptPreview" class="node-prompt-preview" hidden></div>

    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
  </body>
</html>
